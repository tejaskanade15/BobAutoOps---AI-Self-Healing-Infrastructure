# Prometheus Configuration for BobAutoOps
# This configuration scrapes metrics from the monitored-app and evaluates alert rules

global:
  scrape_interval: 15s      # Scrape targets every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'bobautoops'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'  # Docker service name
            # For local testing without Docker: - 'localhost:9093'

# Load alert rules
rule_files:
  - 'alert-rules.yml'

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Scrape the monitored Node.js application
  - job_name: 'bobautoops-monitored-app'
    scrape_interval: 10s  # More frequent scraping for demo purposes
    scrape_timeout: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:3000']  # Docker to host machine
        # For local testing without Docker: - targets: ['localhost:3000']
        labels:
          service: 'monitored-app'
          app: 'bobautoops'
          component: 'backend'
    
    # Relabel configurations for better metric organization
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'monitored-app'

  # Scrape Alertmanager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        # For local testing without Docker: - targets: ['localhost:9093']
        labels:
          service: 'alertmanager'

# Made with Bob
