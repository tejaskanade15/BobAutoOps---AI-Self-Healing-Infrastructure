# Alertmanager Configuration for BobAutoOps
# Sends webhook notifications to the autoops-backend when alerts fire

global:
  resolve_timeout: 5m
  # SMTP configuration (optional - for email notifications)
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alertmanager@bobautoops.com'
  # smtp_auth_username: 'your-email@gmail.com'
  # smtp_auth_password: 'your-app-password'

# Templates for alert notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route configuration - defines how alerts are routed to receivers
route:
  # Default receiver for all alerts
  receiver: 'bobautoops-webhook'
  
  # Group alerts by these labels
  group_by: ['alertname', 'cluster', 'service', 'error_type']
  
  # Wait time before sending initial notification
  group_wait: 10s
  
  # Wait time before sending notification about new alerts in the same group
  group_interval: 10s
  
  # Wait time before re-sending notification for the same alert
  repeat_interval: 5m
  
  # Child routes for specific alert types
  routes:
    # Critical errors - immediate notification
    - match:
        severity: critical
      receiver: 'bobautoops-webhook'
      group_wait: 5s
      repeat_interval: 3m
      continue: true  # Continue to other routes
    
    # Database errors - specific handling
    - match:
        alert_type: database_error
      receiver: 'bobautoops-webhook'
      group_wait: 5s
      repeat_interval: 2m
    
    # Application down - immediate notification
    - match:
        alert_type: application_down
      receiver: 'bobautoops-webhook'
      group_wait: 0s
      repeat_interval: 1m
    
    # Warning level alerts
    - match:
        severity: warning
      receiver: 'bobautoops-webhook'
      group_wait: 30s
      repeat_interval: 10m

# Inhibition rules - suppress certain alerts when others are firing
inhibit_rules:
  # Suppress all other alerts when application is down
  - source_match:
      alert_type: application_down
    target_match_re:
      alert_type: '.*'
    equal: ['instance']
  
  # Suppress high error rate when specific error types are already firing
  - source_match:
      alert_type: database_error
    target_match:
      alert_type: high_error_rate
    equal: ['instance']

# Receivers - define where to send notifications
receivers:
  # Main webhook receiver for BobAutoOps backend
  - name: 'bobautoops-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:4000/alert'
        # For local testing without Docker: url: 'http://localhost:4000/alert'
        send_resolved: true
        http_config:
          follow_redirects: true
        max_alerts: 0  # Send all alerts (no limit)
  
  # Optional: Email receiver (uncomment and configure if needed)
  # - name: 'email-notifications'
  #   email_configs:
